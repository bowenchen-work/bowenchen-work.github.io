<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="../img/Black-Cat-Favicon.ico"
      type="image/x-icon"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/style.css" />

    <title>Bowen Chen - Portfolio</title>
  </head>
  <body>
    <nav class="navbar bg-transparent py-3">
      <div class="container-fluid d-flex flex-column align-items-center">
        <a class="navbar-brand mb-2" href="#">
          <img
            src="../img/Black-Cat-Favicon.ico"
            alt="Logo"
            width="30"
            height="30"
            class="d-inline-block align-text-top"
          />
          <span class="fw-bold">Bowen Chen</span>
        </a>

        <ul class="nav justify-content-center list-unstyled gap-3">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../html/about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../html/projects.html">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../html/resume.html">Resume</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="../html/contact.html">Contact</a>
          </li>
        </ul>
      </div>
    </nav>

    <section class="main-container container mt-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="welcome mb-5 text-center">
            <h1 class="display-4 fw-bold">Contact me!</h1>
            <p class="lead text-muted">
              I build clean, responsive web experiences.
            </p>
          </div>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-6 container mb-5 box-1 p-4 border rounded shadow-sm">
          <form class="needs-validation" novalidate>
            <div class="mb-3">
              <label for="name" class="form-label small fw-bold">Name</label>
              <input
                type="text"
                id="name"
                class="form-control"
                placeholder="Your Name"
                required
              />
            </div>
            <div class="mb-3">
              <label for="email" class="form-label small fw-bold">Email</label>
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="your.email@example.com"
                required
              />
            </div>
            <div class="mb-3">
              <label for="msg" class="form-label small fw-bold">Message</label>
              <textarea
                id="msg"
                class="form-control"
                rows="3"
                placeholder="Tell me about..."
                required
              ></textarea>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-primary">
                Send Message
              </button>
            </div>
          </form>
        </div>
      </div>

      <div class="row justify-content-center">
        <div class="col-md-6 container mb-5 box-1 p-4 border rounded shadow-sm">
          <div class="welcome mb-2 text-center">
            <h3 class="display-4 fw-bold">Or write me an Email!</h3>
            <p class="lead text-muted">bowenchen-work@gmail.com</p>
            <p>
              <a href="mailto:bowenchen-work@gmail.com" class="btn btn-primary"
                >Send email</a
              >
            </p>
          </div>
        </div>
      </div>
    </section>

    <footer class="container py-5 mt-5 border-top">
      <div class="row gy-4 align-items-center">
        <div class="col-md-6 text-center text-md-start">
          <p class="mb-0 text-secondary">
            <i data-lucide="copyright" class="me-1"></i> 2026 Bowen Chen
          </p>
        </div>

        <div class="col-md-6">
          <ul
            class="nav justify-content-center justify-content-md-end list-unstyled d-flex gap-4"
          >
            <li>
              <a
                href="#contact"
                class="footer-link d-flex align-items-center gap-2"
              >
                <i data-lucide="mail"></i> Contact
              </a>
            </li>
            <li>
              <a href="#" class="footer-link d-flex align-items-center gap-2">
                <i data-lucide="link"></i> Links
              </a>
            </li>
            <li>
              <span class="d-flex align-items-center gap-2 text-secondary">
                <i data-lucide="circle-dot" class="text-success"></i>
                Available
              </span>
            </li>
          </ul>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();

      (() => {
        "use strict";
        const forms = document.querySelectorAll(".needs-validation");
        Array.from(forms).forEach((form) => {
          form.addEventListener(
            "submit",
            (event) => {
              if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
              }
              form.classList.add("was-validated");
            },
            false,
          );
        });
      })();
    </script>
  </body>
</html>
